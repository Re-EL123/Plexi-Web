<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/jpeg" href="../assets/icons/logo.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store — Plexi Digital Mall</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/neomorphism.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    .store-hero {
      height: 260px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      position: relative;
      overflow: hidden;
    }
    .store-hero img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .store-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    }
    .store-info-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
      position: sticky; top: var(--header-h);
      z-index: 10;
    }
    .store-info-inner {
      display: flex;
      align-items: flex-end;
      gap: var(--space-lg);
      padding: 0 0 var(--space-lg);
      position: relative;
      margin-top: -48px;
    }
    .store-logo-large {
      width: 88px; height: 88px;
      border-radius: var(--radius-lg);
      border: 4px solid var(--surface);
      background: var(--bg);
      box-shadow: var(--neo-shadow);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800;
      color: var(--primary);
      overflow: hidden;
      flex-shrink: 0;
    }
    .store-logo-large img { width: 100%; height: 100%; object-fit: cover; }
    .store-meta { flex: 1; min-width: 0; padding-top: 56px; }
    .store-name-large {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 800;
      color: var(--text-primary);
      display: flex; align-items: center; gap: var(--space-sm);
    }
    .store-sub {
      display: flex; align-items: center; gap: var(--space-md);
      margin-top: 6px; flex-wrap: wrap;
    }
    .store-sub span { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

    .store-tabs-bar {
      display: flex;
      gap: 2px;
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--border-light);
      background: var(--surface);
    }
    .store-tab {
      padding: 8px var(--space-md);
      border: none; background: none;
      font-family: var(--font-body); font-size: 14px; font-weight: 600;
      color: var(--text-secondary); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: var(--transition-fast);
    }
    .store-tab:hover { color: var(--text-primary); }
    .store-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .review-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      transition: var(--transition);
    }
    .review-card:hover { box-shadow: 0 4px 16px rgba(44,62,80,0.08); }
  </style>
</head>
<body>

<div id="page-loader" class="page-loader">
  <div class="loader-logo">Plexi<span>Mall</span></div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container navbar-inner">
    <a href="../index.html" class="navbar-logo">
      <img src="../assets/icons/logo.jpg" alt="Plexi">
      Plexi<span>Mall</span>
    </a>
    <div class="navbar-search" style="flex:1;max-width:380px;">
      <div class="search-bar">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="product-search" placeholder="Search in this store…" oninput="filterProducts(this.value)">
      </div>
    </div>
    <div class="navbar-nav">
      <a href="../index.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Home
      </a>
      <div id="nav-cart-btn" style="position:relative;display:none;">
        <button class="btn btn-ghost btn-icon" onclick="openCartPanel()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span id="cart-badge" class="badge badge-error" style="position:absolute;top:-6px;right:-6px;display:none;width:18px;height:18px;padding:0;align-items:center;justify-content:center;font-size:10px;">0</span>
        </button>
      </div>
      <div id="nav-guest" style="display:flex;gap:4px;">
        <a href="../login.html" class="btn btn-ghost btn-sm">Login</a>
        <a href="../signup.html" class="btn btn-primary btn-sm">Sign Up</a>
      </div>
      <div id="nav-user" style="display:none;align-items:center;gap:var(--space-sm);">
        <div class="dropdown">
          <button data-dropdown="store-user-menu" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:var(--radius-md);">
            <div class="avatar avatar-sm" data-user-avatar></div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="dropdown-menu" id="store-user-menu">
            <a href="#" id="nav-dashboard" class="dropdown-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              Dashboard
            </a>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item danger" onclick="Auth.logout()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Log Out
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- STORE HERO BANNER -->
<div class="store-hero" id="store-banner">
  <div class="store-hero-overlay"></div>
</div>

<!-- STORE INFO BAR -->
<div class="store-info-bar">
  <div class="container">
    <div class="store-info-inner">
      <div class="store-logo-large" id="store-logo-el">
        <div class="skeleton" style="width:100%;height:100%;border-radius:0;"></div>
      </div>
      <div class="store-meta">
        <div class="store-name-large" id="store-name-el">
          <div class="skeleton" style="width:200px;height:32px;"></div>
        </div>
        <div class="store-sub" id="store-sub-el">
          <div class="skeleton" style="width:280px;height:16px;margin-top:8px;"></div>
        </div>
      </div>
      <div style="display:flex;gap:var(--space-sm);align-items:center;padding-top:52px;">
        <button id="follow-btn" class="btn btn-outline btn-sm" onclick="toggleFollow()" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Follow
        </button>
        <button class="btn btn-primary btn-sm" onclick="scrollToProducts()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Browse Products
        </button>
      </div>
    </div>

    <!-- Store Tabs -->
    <div class="store-tabs-bar">
      <button class="store-tab active" onclick="switchTab('products', this)">Products</button>
      <button class="store-tab" onclick="switchTab('reviews', this)">Reviews</button>
      <button class="store-tab" onclick="switchTab('about', this)">About</button>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<main class="container" style="padding-top:var(--space-xl);padding-bottom:var(--space-3xl);">

  <!-- BREADCRUMB -->
  <div class="breadcrumb" style="margin-bottom:var(--space-lg);">
    <a href="../index.html">Home</a>
    <span class="sep">›</span>
    <a href="../index.html">Stores</a>
    <span class="sep">›</span>
    <span class="current" id="breadcrumb-name">Store</span>
  </div>

  <!-- PRODUCTS TAB -->
  <div id="tab-products">
    <!-- Filters -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-md);margin-bottom:var(--space-lg);">
      <div class="filter-chips" id="category-filters">
        <button class="chip active" data-cat="all" onclick="filterCategory('all',this)">All</button>
      </div>
      <div style="display:flex;gap:var(--space-sm);align-items:center;">
        <select id="sort-sel" class="form-control" style="width:auto;" onchange="sortProducts(this.value)">
          <option value="newest">Newest</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="name">A–Z</option>
        </select>
      </div>
    </div>

    <div id="products-grid" class="grid-auto" style="margin-bottom:var(--space-xl);">
      <!-- Skeleton -->
      ${[1,2,3,4,5,6].map(()=>`
      <div class="card" style="height:280px;">
        <div class="skeleton" style="height:160px;border-radius:var(--radius-xl) var(--radius-xl) 0 0;"></div>
        <div style="padding:var(--space-md);">
          <div class="skeleton" style="height:16px;width:70%;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:20px;width:40%;"></div>
        </div>
      </div>`).join('')}
    </div>
    <div id="products-pagination" style="margin-top:var(--space-lg);"></div>
  </div>

  <!-- REVIEWS TAB -->
  <div id="tab-reviews" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-lg);">
      <div>
        <h3>Customer Reviews</h3>
        <div style="display:flex;align-items:center;gap:var(--space-sm);margin-top:6px;">
          <div id="avg-stars"></div>
          <span id="avg-rating" style="font-size:22px;font-weight:800;color:var(--primary);">—</span>
          <span style="color:var(--text-muted);font-size:14px;" id="review-count">(0 reviews)</span>
        </div>
      </div>
      <button class="btn btn-primary" id="write-review-btn" onclick="openReviewModal()" style="display:none;">Write a Review</button>
    </div>
    <div id="reviews-grid" class="grid-3">
      <div style="grid-column:1/-1;text-align:center;padding:var(--space-xl);color:var(--text-muted);">Loading reviews…</div>
    </div>
  </div>

  <!-- ABOUT TAB -->
  <div id="tab-about" style="display:none;">
    <div style="max-width:720px;">
      <div class="neo-card" style="margin-bottom:var(--space-lg);">
        <h3 style="margin-bottom:var(--space-md);">About This Store</h3>
        <p id="about-description" style="color:var(--text-secondary);line-height:1.8;">Loading…</p>
      </div>
      <div class="neo-card">
        <h4 style="margin-bottom:var(--space-md);">Store Details</h4>
        <div style="display:grid;gap:var(--space-sm);">
          <div class="flex-between" style="padding:var(--space-sm) 0;border-bottom:1px solid var(--border-light);">
            <span style="font-size:13px;color:var(--text-muted);">Category</span>
            <span id="about-category" style="font-weight:600;font-size:13px;">—</span>
          </div>
          <div class="flex-between" style="padding:var(--space-sm) 0;border-bottom:1px solid var(--border-light);">
            <span style="font-size:13px;color:var(--text-muted);">Status</span>
            <span id="about-status">—</span>
          </div>
          <div class="flex-between" style="padding:var(--space-sm) 0;border-bottom:1px solid var(--border-light);">
            <span style="font-size:13px;color:var(--text-muted);">Member Since</span>
            <span id="about-since" style="font-weight:600;font-size:13px;">—</span>
          </div>
          <div class="flex-between" style="padding:var(--space-sm) 0;">
            <span style="font-size:13px;color:var(--text-muted);">Featured</span>
            <span id="about-featured">—</span>
          </div>
        </div>
      </div>
      <div class="neo-card" style="margin-top:var(--space-lg);">
        <h4 style="margin-bottom:var(--space-md);">Trading Hours</h4>
        <div id="about-trading-hours" style="display:grid;gap:var(--space-sm);">—</div>
      </div>
    </div>
  </div>

</main>

<div id="toast-container"></div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/state.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const storeId = params.get('id');

  let storeData    = null;
  let allProducts  = [];
  let filteredProds = [];
  let currentPage  = 1;
  const PER_PAGE   = 12;
  let activeCategory = 'all';
  let sortOrder    = 'newest';

  if (!storeId) { location.href = '../index.html'; }

  document.addEventListener('DOMContentLoaded', async () => {
    initNav();
    UI.initDropdowns();
    await loadStore();
    UI.hidePageLoader();
  });

  function initNav() {
    const user = Auth.getUser();
    if (user) {
      document.getElementById('nav-guest').style.display = 'none';
      document.getElementById('nav-user').style.display  = 'flex';
      document.getElementById('nav-cart-btn').style.display = 'block';
      Auth.populateUserUI();
      const dash = document.getElementById('nav-dashboard');
      const map  = { admin:'../dashboard/admin.html', seller:'../dashboard/seller.html', shopper:'../dashboard/shopper.html' };
      if (dash) dash.href = map[user.role] || '#';
      document.getElementById('follow-btn').style.display = 'flex';
      document.getElementById('write-review-btn').style.display = 'flex';
      Dashboard.loadCartCount();
    }
  }

  async function loadStore() {
    try {
      storeData = await api.stores.get(storeId);
      renderStoreHeader();
      await Promise.all([ loadProducts(), loadReviews() ]);
    } catch (err) {
      UI.toast('Could not load store: ' + err.message, 'error');
    }
  }

  function renderStoreHeader() {
    const s = storeData;
    document.title = `${s.name} — Plexi Digital Mall`;
    document.getElementById('breadcrumb-name').textContent = s.name;

    // Banner
    const banner = document.getElementById('store-banner');
    if (s.banner) {
      banner.innerHTML = `<img src="${s.banner}" alt="${s.name}"><div class="store-hero-overlay"></div>`;
    } else {
      banner.style.background = `linear-gradient(135deg, var(--primary), var(--secondary))`;
    }

    // Logo
    const logoEl = document.getElementById('store-logo-el');
    logoEl.innerHTML = s.logo
      ? `<img src="${s.logo}" alt="${s.name}">`
      : s.name.charAt(0).toUpperCase();

    // Name + sub
    document.getElementById('store-name-el').innerHTML = `
      ${s.name}
      ${s.featured ? '<span class="badge badge-secondary">⭐ Featured</span>' : ''}
    `;
    document.getElementById('store-sub-el').innerHTML = `
      <span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${s.category}
      </span>
    <span id="store-open-badge"></span>
    <span>${UI.statusBadge(s.status, CONFIG.STORE_STATUSES)}</span>
    <span>Joined ${UI.formatDate(s.created_at)}</span>
    <span id="product-count-sub"></span>
    `;

    // About tab
    document.getElementById('about-description').textContent = s.description || 'No description provided.';
    document.getElementById('about-category').textContent    = s.category;
    document.getElementById('about-status').innerHTML        = UI.statusBadge(s.status, CONFIG.STORE_STATUSES);
    document.getElementById('about-since').textContent       = UI.formatDate(s.created_at);
    document.getElementById('about-featured').innerHTML      = s.featured ? UI.badge('Yes','success') : UI.badge('No','gray');

    // Trading hours
    renderTradingHours(s.trading_hours);
    const isOpen = CONFIG.isOpen(s.trading_hours);
    document.getElementById('store-open-badge').innerHTML = isOpen === null
      ? ''
      : isOpen
        ? '<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(39,174,96,0.1);color:var(--success);padding:3px 10px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;">● Open Now</span>'
        : '<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(192,57,43,0.1);color:var(--error);padding:3px 10px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;">● Closed</span>';
  }

  async function loadProducts() {
    try {
      const data = await api.products.list(storeId);
      allProducts = Array.isArray(data) ? data : (data.products || []);

      // Build category filter chips
      const cats = [...new Set(allProducts.map(p => p.category))].filter(Boolean);
      const bar  = document.getElementById('category-filters');
      bar.innerHTML = `<button class="chip active" data-cat="all" onclick="filterCategory('all',this)">All (${allProducts.length})</button>
        ${cats.map(c => `<button class="chip" data-cat="${c}" onclick="filterCategory('${c}',this)">${capitalize(c)}</button>`).join('')}`;

      document.getElementById('product-count-sub').innerHTML = `
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        ${allProducts.length} products
      `;

      applyFilters();
    } catch (err) {
      document.getElementById('products-grid').innerHTML = UI.empty('No Products', 'This store has not added any products yet.');
    }
  }

  function applyFilters() {
    let list = [...allProducts];
    if (activeCategory !== 'all') list = list.filter(p => p.category === activeCategory);
    const q = document.getElementById('product-search')?.value.toLowerCase() || '';
    if (q) list = list.filter(p => p.name?.toLowerCase().includes(q) || p.description?.toLowerCase().includes(q));
    if (sortOrder === 'price-asc')  list.sort((a,b) => a.price - b.price);
    if (sortOrder === 'price-desc') list.sort((a,b) => b.price - a.price);
    if (sortOrder === 'name')       list.sort((a,b) => a.name.localeCompare(b.name));
    if (sortOrder === 'newest')     list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    filteredProds = list;
    currentPage = 1;
    renderProducts();
  }

  function renderProducts() {
    const grid  = document.getElementById('products-grid');
    const total = Math.ceil(filteredProds.length / PER_PAGE);
    const page  = filteredProds.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

    if (!page.length) {
      grid.innerHTML = UI.empty('No Products Found', 'Try a different category or search term.');
      document.getElementById('products-pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = page.map((p, i) => `
      <div class="product-card stagger-child animate-fadeIn delay-${Math.min(i+1,8)}"
           onclick="location.href='product.html?id=${p.id}'">
        <div class="product-card-img">
          ${p.images?.[0]
            ? `<img src="${p.images[0]}" alt="${p.name}">`
            : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;background:var(--bg);">🛍️</div>`}
          ${p.inventory === 0 ? `<div style="position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;"><span class="badge badge-error">Out of Stock</span></div>` : ''}
          <button class="product-card-wish" onclick="event.stopPropagation();wishToggle(this,'${p.id}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>
        <div class="product-card-body">
          <div class="product-card-name">${p.name}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">${capitalize(p.category)}</div>
          <div class="product-card-price">${UI.formatCurrency(p.price)}</div>
          <div style="font-size:11px;color:${p.inventory > 5 ? 'var(--success)' : p.inventory > 0 ? 'var(--warning)' : 'var(--error)'};margin-top:4px;font-weight:600;">
            ${p.inventory > 5 ? '✓ In Stock' : p.inventory > 0 ? `⚠ Only ${p.inventory} left` : '✗ Out of Stock'}
          </div>
        </div>
        <div class="product-card-footer">
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();addToCart('${p.id}')" ${p.inventory===0?'disabled':''}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Add to Cart
          </button>
          <a href="product.html?id=${p.id}" class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">View</a>
        </div>
      </div>
    `).join('');

    UI.staggerReveal(grid);

    // Pagination
    const pgEl = document.getElementById('products-pagination');
    if (total > 1) {
      let html = '<div class="pagination">';
      html += `<button class="page-btn" ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>`;
      for (let i = 1; i <= total; i++) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      }
      html += `<button class="page-btn" ${currentPage===total?'disabled':''} onclick="goPage(${currentPage+1})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button></div>`;
      pgEl.innerHTML = html;
    } else {
      pgEl.innerHTML = '';
    }
  }

  async function loadReviews() {
    try {
      const data    = await api.reviews.list({ store_id: storeId });
      const reviews = Array.isArray(data) ? data : (data.reviews || []);

      // Avg rating
      const avg = reviews.length ? (reviews.reduce((s,r) => s+r.rating, 0) / reviews.length) : 0;
      document.getElementById('avg-stars').innerHTML   = UI.stars(Math.round(avg));
      document.getElementById('avg-rating').textContent = avg ? avg.toFixed(1) : '—';
      document.getElementById('review-count').textContent = `(${reviews.length} review${reviews.length!==1?'s':''})`;

      const grid = document.getElementById('reviews-grid');
      if (!reviews.length) {
        grid.innerHTML = UI.empty('No Reviews Yet', 'Be the first to review this store!');
        return;
      }
      grid.innerHTML = reviews.map(r => `
        <div class="review-card stagger-child">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--space-sm);">
            <div style="display:flex;align-items:center;gap:var(--space-sm);">
              ${UI.avatar(r.user_id, 'sm')}
              <div>
                <div style="font-weight:600;font-size:13px;">User ${r.user_id?.slice(0,8)}…</div>
                <div style="font-size:11px;color:var(--text-muted);">${UI.timeAgo(r.created_at)}</div>
              </div>
            </div>
            ${UI.stars(r.rating)}
          </div>
          <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;">${r.comment || 'No comment left.'}</p>
          ${r.images?.length ? `<div style="display:flex;gap:8px;margin-top:var(--space-sm);">${r.images.slice(0,3).map(img=>`<img src="${img}" style="width:56px;height:56px;border-radius:var(--radius-sm);object-fit:cover;">`).join('')}</div>` : ''}
          <div style="display:flex;align-items:center;justify-content:flex-end;margin-top:var(--space-sm);">
            <button class="btn btn-ghost btn-sm" onclick="likeReview('${r.id}',this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
              Helpful
            </button>
          </div>
        </div>
      `).join('');
      UI.staggerReveal(grid);
    } catch (_) {}
  }

  // ---- ACTIONS ---- //
  function filterCategory(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function filterProducts(val) { applyFilters(); }
  function sortProducts(val)   { sortOrder = val; applyFilters(); }
  function goPage(p)           { currentPage = p; renderProducts(); scrollToProducts(); }

  function scrollToProducts() {
    document.getElementById('tab-products').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function switchTab(tab, btn) {
    ['products','reviews','about'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
    });
    document.querySelectorAll('.store-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'reviews') UI.staggerReveal(document.getElementById('reviews-grid'));
  }

  async function addToCart(productId) {
    if (!Auth.isLoggedIn()) { UI.toast('Please login to add to cart','warning'); setTimeout(()=>location.href='../login.html',1000); return; }
    try {
      await api.cart.add({ product_id: productId, quantity: 1 });
      UI.toast('Added to cart! 🛒','success');
      Dashboard.loadCartCount();
    } catch (err) { UI.toast(err.message || 'Failed','error'); }
  }

  async function wishToggle(btn, productId) {
    if (!Auth.isLoggedIn()) { UI.toast('Please login first','warning'); return; }
    try {
      if (btn.classList.contains('active')) {
        await api.wishlist.remove(productId);
        btn.classList.remove('active');
        UI.toast('Removed from wishlist','info');
      } else {
        await api.wishlist.add(productId);
        btn.classList.add('active');
        UI.toast('Saved to wishlist ❤️','success');
      }
    } catch (err) { UI.toast(err.message,'error'); }
  }

  async function likeReview(reviewId, btn) {
    if (!Auth.isLoggedIn()) { UI.toast('Please login first','warning'); return; }
    try {
      await api.reviews.like(reviewId);
      btn.style.color = 'var(--primary)';
      UI.toast('Marked as helpful!','success');
    } catch (_) {}
  }

  function toggleFollow() {
    const btn = document.getElementById('follow-btn');
    const following = btn.dataset.following === 'true';
    btn.dataset.following = !following;
    btn.innerHTML = following
      ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Follow`
      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="var(--primary)" stroke="var(--primary)" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Following`;
    UI.toast(following ? 'Unfollowed store' : 'Now following this store!', following ? 'info' : 'success');
  }

  function openReviewModal() {
    UI.createModal({
      id: 'review-modal',
      title: 'Write a Review',
      content: `
        <form id="review-form" onsubmit="submitReview(event)">
          <div class="form-group">
            <label class="form-label">Rating</label>
            <div id="star-picker" style="display:flex;gap:var(--space-sm);">
              ${[1,2,3,4,5].map(n => `
                <button type="button" class="star-btn" data-val="${n}" onclick="setRating(${n})"
                  style="background:none;border:none;cursor:pointer;font-size:28px;transition:transform 0.15s;">⭐</button>
              `).join('')}
            </div>
            <input type="hidden" id="rating-val" name="rating" value="5">
          </div>
          <div class="form-group">
            <label class="form-label">Comment</label>
            <textarea class="form-control" name="comment" rows="4" placeholder="Share your experience with this store…"></textarea>
          </div>
        </form>`,
      footer: `
        <button class="btn btn-ghost" onclick="UI.closeModal('review-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="document.getElementById('review-form').requestSubmit()">Submit Review</button>`
    });
    setRating(5);
  }

  function setRating(val) {
    document.getElementById('rating-val').value = val;
    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.style.opacity  = parseInt(btn.dataset.val) <= val ? '1' : '0.3';
      btn.style.transform = parseInt(btn.dataset.val) <= val ? 'scale(1.1)' : 'scale(1)';
    });
  }

  async function submitReview(e) {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target).entries());
    try {
      await api.reviews.create({ ...data, store_id: storeId, rating: parseInt(data.rating) });
      UI.toast('Review submitted! Thank you 🙏','success');
      UI.closeModal('review-modal');
      loadReviews();
    } catch (err) { UI.toast(err.message,'error'); }
  }

  function capitalize(s) { return (s||'').charAt(0).toUpperCase() + (s||'').slice(1); }

  function renderTradingHours(hours) {
    const el = document.getElementById('about-trading-hours');
    if (!hours || typeof hours !== 'object') { el.innerHTML = '<span style="font-size:13px;color:var(--text-muted);">Not set</span>'; return; }
    const dayMap = ['sun','mon','tue','wed','thu','fri','sat'];
    const now = new Date();
    const today = dayMap[now.getDay()];
    el.innerHTML = CONFIG.TRADING_DAYS.map(day => {
      const d = hours[day] || { open:'', close:'', enabled:false };
      const isToday = day === today;
      let timeStr = 'Closed';
      let dotColor = 'var(--text-muted)';
      if (d.enabled && d.open && d.close) {
        timeStr = `${formatTime12(d.open)} – ${formatTime12(d.close)}`;
        if (isToday) {
          const open = CONFIG.isOpen(hours);
          dotColor = open ? 'var(--success)' : 'var(--error)';
        } else {
          dotColor = 'var(--text-secondary)';
        }
      }
      return `<div class="flex-between" style="padding:6px 0;${isToday?'font-weight:700;':''}${d.enabled?'':'opacity:0.5;'}">
        <span style="font-size:13px;${isToday?'color:var(--text-primary);':'color:var(--text-muted);'}">${CONFIG.TRADING_DAY_LABELS[day]}${isToday?' (Today)':''}</span>
        <span style="font-size:13px;display:flex;align-items:center;gap:6px;color:var(--text-secondary);">
          <span style="width:6px;height:6px;border-radius:50%;background:${dotColor};flex-shrink:0;"></span>
          ${timeStr}
        </span>
      </div>`;
    }).join('');
  }

  function formatTime12(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hr = h % 12 || 12;
    return `${hr}:${String(m).padStart(2,'0')} ${ampm}`;
  }
</script>
</body>
</html>
